<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ferge" />
  <meta name="theme-color" content="#0d1117" />
  <title>Rv19 Ferge</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d1117'/%3E%3Ctext x='90' y='128' font-size='100' text-anchor='middle' fill='%2358a6ff'%3E%E2%9B%B4%3C/text%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --radius:    16px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      min-height: 100dvh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html {
      background: url('background.png') center center / cover no-repeat scroll;
    }

    body {
      padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bot) + 24px);
      max-width: 500px;
      margin: 0 auto;
      background: transparent;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      gap: 4px;
    }

    .route-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    #status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.ok    { background: var(--green); }
    .dot.error { background: var(--red); }
    .dot.spin  {
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    #departures {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 460px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #departures::-webkit-scrollbar { display: none; }

    .card {
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      gap: 4px 12px;
      transition: border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .card.next-dep {
      border-color: var(--accent);
    }

    .dep-time {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      grid-row: 1;
      grid-column: 1;
    }

    .card.next-dep .dep-time {
      color: var(--accent);
    }

    .countdown {
      font-size: 22px;
      font-weight: 600;
      text-align: right;
      line-height: 1;
      grid-row: 1;
      grid-column: 2;
      font-variant-numeric: tabular-nums;
    }

    .countdown.soon   { color: var(--yellow); }
    .countdown.urgent { color: var(--red); }
    .countdown.ok     { color: var(--green); }

    .line-name {
      font-size: 14px;
      color: var(--muted);
      grid-row: 2;
      grid-column: 1;
      margin-top: 4px;
    }

    .arr-time {
      font-size: 14px;
      color: var(--muted);
      grid-row: 2;
      grid-column: 2;
      margin-top: 4px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      height: 88px;
    }
    .skeleton::after {
      content: '';
      display: block;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, #ffffff0d 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .day-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
    }
    .day-separator::before,
    .day-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e293b;
    }

    .error-card {
      background: #1a0d0d;
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--red);
      font-size: 15px;
      line-height: 1.5;
    }

    .refresh-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .refresh-meta {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.7;
    }

    #countdown-bar {
      height: 3px;
      width: 100%;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #countdown-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear;
    }


    .notice-card {
      background: rgba(30, 20, 5, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid #b45309;
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .notice-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
    }
    .notice-icon { font-size: 18px; flex-shrink: 0; }
    .notice-header-text { flex: 1; }
    .notice-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f59e0b;
    }
    .notice-preview {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    .notice-chevron {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .notice-card.open .notice-chevron { transform: rotate(180deg); }
    .notice-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .notice-card.open .notice-body { max-height: 600px; }
    .notice-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      padding: 0 16px 14px 44px;
    }

    .direction-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(13,17,23,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      transition: border-color 0.2s;
      white-space: nowrap;
    }
    .direction-toggle:active { border-color: var(--accent); }
    .direction-toggle .arrow { font-size: 18px; transition: transform 0.3s; }
    .direction-toggle.flipped .arrow { transform: scaleX(-1); }

    .direction-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .date-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }
    .date-display {
      flex: 1;
      position: relative;
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      transition: border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .date-display:active { border-color: var(--accent); }
    .date-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      border: none;
      background: none;
    }
    .date-nav-btn {
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 16px;
      color: var(--text);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }
    .date-nav-btn:active { border-color: var(--accent); }

    .date-today-btn {
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }
    .date-today-btn:active { border-color: var(--accent); color: var(--accent); }

  </style>
</head>
<body>

<header>
  <div>
    <div class="route-label">Rv19 · Torghatten</div>
    <h1>Fergeavganger</h1>
  </div>
  <button class="direction-toggle" id="dir-btn" onclick="toggleDirection()">
    <span class="arrow">⛴</span>
    <span id="dir-label">Horten→Moss</span>
  </button>
  <div id="status-row">
    <div class="dot spin" id="dot"></div>
    <span id="status-text">Henter avganger…</span>
  </div>
</header>

<div id="notices" aria-live="polite"></div>

<div class="date-row">
  <button class="date-nav-btn" id="prev-day-btn" onclick="shiftDay(-1)" style="display:none">‹</button>
  <label class="date-display" style="position:relative;overflow:hidden;cursor:pointer"
    onclick="try{document.getElementById('date-input').showPicker()}catch(e){}">
    <span id="date-display-text"></span>
    <span style="font-size:12px;opacity:0.5;margin-left:6px">📅</span>
    <input type="date" id="date-input" onchange="onDateChange()"
      style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer" />
  </label>
  <button class="date-nav-btn" onclick="shiftDay(1)">›</button>
</div>

<div id="departures" aria-live="polite" aria-label="Neste avganger">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<button class="refresh-btn" onclick="fetchDepartures();fetchNotices()">
  <span>Oppdater nå</span>
  <span class="refresh-meta">Oppdateres automatisk hvert minutt</span>
  <div id="countdown-bar"><div id="countdown-fill"></div></div>
</button>

<script>
  const STOPS = {
    horten: 'NSR:StopPlace:18699',
    moss:   'NSR:StopPlace:58092'
  };
  const PORTS = {
    horten: { lat: 59.4133, lon: 10.4902 },
    moss:   { lat: 59.4378, lon: 10.6578 }
  };

  function distKm(lat1, lon1, lat2, lon2) {
    const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  let direction = 'horten';

  function currentFrom() { return direction === 'horten' ? STOPS.horten : STOPS.moss; }
  function currentTo()   { return direction === 'horten' ? STOPS.moss   : STOPS.horten; }

  function toggleDirection() {
    applyDirection(direction === 'horten' ? 'moss' : 'horten');
    fetchDepartures();
  }
  const DEVIATIONS_PAGE = 'https://www.torghatten.no/en/our-routes/deviations';
  const PROXY = 'https://api.allorigins.win/raw?url=';

  const TYPE_LABELS = {
    Deviation:    'Avvik',
    ExtraTrip:    'Ekstraavgang',
    Information:  'Informasjon',
    Cancellation: 'Innstilling',
  };

  const BUILD_ID_KEY = 'torghatten_buildId';

  async function fetchBuildId() {
    const res  = await fetch(PROXY + encodeURIComponent(DEVIATIONS_PAGE));
    const html = await res.text();
    const m    = html.match(/"buildId":"([^"]+)"/);
    if (!m) throw new Error('buildId not found');
    localStorage.setItem(BUILD_ID_KEY, m[1]);
    return m[1];
  }

  async function fetchDeviationsJson(buildId) {
    const url = `https://www.torghatten.no/_next/data/${buildId}/en/our-routes/deviations.json`;
    return fetch(PROXY + encodeURIComponent(url));
  }

  async function fetchNotices() {
    try {
      let buildId = localStorage.getItem(BUILD_ID_KEY);

      // No cached buildId — fetch HTML to get one
      if (!buildId) buildId = await fetchBuildId();

      let res = await fetchDeviationsJson(buildId);

      // Stale buildId — re-fetch and retry once
      if (res.status === 404) {
        buildId = await fetchBuildId();
        res = await fetchDeviationsJson(buildId);
      }

      if (!res.ok) return;
      const data = await res.json();
      const rv19 = (data?.pageProps?.trafficAnnouncements || []).filter(a => a.publicCode === 'Rv19');
      renderNotices(rv19);
    } catch (e) {
      localStorage.removeItem(BUILD_ID_KEY);
      console.warn('Notices fetch failed:', e);
    }
  }

  function renderNotices(notices) {
    const container = document.getElementById('notices');
    if (!notices.length) { container.innerHTML = ''; return; }
    container.innerHTML = notices.map(n => {
      const label   = TYPE_LABELS[n['#type']] || 'Melding';
      const text    = n.info?.description || n.info?.descriptionInEnglish || '';
      const preview = text.slice(0, 60) + (text.length > 60 ? '…' : '');
      return `<div class="notice-card" onclick="this.classList.toggle('open')">
        <div class="notice-header">
          <span class="notice-icon">⚠️</span>
          <div class="notice-header-text">
            <div class="notice-type">${escHtml(label)}</div>
            <div class="notice-preview">${escHtml(preview)}</div>
          </div>
          <span class="notice-chevron">▼</span>
        </div>
        <div class="notice-body">
          <div class="notice-text">${escHtml(text)}</div>
        </div>
      </div>`;
    }).join('');
  }

  const API   = 'https://api.entur.io/journey-planner/v3/graphql';
  const QUERY = `
    query FerrySchedule($stopId: String!, $startTime: DateTime!, $timeRange: Int!) {
      stopPlace(id: $stopId) {
        estimatedCalls(
          startTime: $startTime
          timeRange: $timeRange
          numberOfDepartures: 200
        ) {
          aimedDepartureTime
          expectedDepartureTime
          serviceJourney {
            line { transportMode }
            passingTimes {
              quay { stopPlace { id } }
              arrival { time dayOffset }
            }
          }
        }
      }
    }
  `;

  let refreshTimer = null;
  let barTimer = null;
  let countdownInterval = null;
  const REFRESH_SECS = 60;

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }

  let selectedDate = todayISO();

  function initDateInput() {
    const inp = document.getElementById('date-input');
    inp.min = todayISO();
    inp.value = selectedDate;
    updateControls();
  }

  function onDateChange() {
    const inp = document.getElementById('date-input');
    if (!inp.value) inp.value = selectedDate;
    selectedDate = inp.value;
    showAll = selectedDate !== todayISO();
    updateControls();
    fetchDepartures();
  }

  function shiftDay(delta) {
    const d = new Date(selectedDate + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    const next = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    if (next < todayISO()) return;
    selectedDate = next;
    document.getElementById('date-input').value = selectedDate;
    updateControls();
    fetchDepartures();
  }

  function goToToday() {
    selectedDate = todayISO();
    showAll = false;
    document.getElementById('date-input').value = selectedDate;
    updateControls();
    fetchDepartures();
  }

  function fmtSelectedDate() {
    const d = new Date(selectedDate + 'T12:00:00');
    return d.toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function updateControls() {
    const isToday = selectedDate === todayISO();
    document.getElementById('prev-day-btn').style.display = isToday ? 'none' : '';
    document.getElementById('date-display-text').textContent = isToday ? 'I dag' : fmtSelectedDate();
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtHHMM(isoStr) {
    const d = new Date(isoStr);
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function minutesUntil(isoStr) {
    return Math.round((new Date(isoStr) - Date.now()) / 60000);
  }

  function countdownText(mins) {
    if (mins < 0)  return 'Avgått';
    if (mins === 0) return 'Nå';
    if (mins < 60) return 'om ' + mins + ' min';
    const h = Math.floor(mins / 60), m = mins % 60;
    return 'om ' + h + 't' + (m ? ' ' + m + 'm' : '');
  }

  function countdownClass(mins) {
    if (mins < 0)  return '';
    if (mins <= 5) return 'urgent';
    if (mins <= 15) return 'soon';
    return 'ok';
  }

  let lastRenderedKey = null;

  function renderDepartures(calls, isToday) {
    const container = document.getElementById('departures');
    if (!calls || calls.length === 0) {
      lastRenderedKey = null;
      container.innerHTML = '<div class="error-card">Ingen avganger funnet.</div>';
      return;
    }

    const key = calls.map(c => c.aimedDepartureTime).join(',') + '|' + isToday;
    if (key === lastRenderedKey) {
      // Same departures — only update countdowns in place, no DOM rebuild
      if (isToday) updateCountdowns(calls);
      return;
    }
    lastRenderedKey = key;

    const line = direction === 'horten' ? 'Horten–Moss' : 'Moss–Horten';
    container.innerHTML = '';
    let shownNextDay = false;
    let firstCard = true;
    calls.forEach((c) => {
      const depISO = c.expectedDepartureTime || c.aimedDepartureTime;
      const mins   = minutesUntil(depISO);

      const depDate = new Date(depISO);
      const depLocalDate = depDate.getFullYear() + '-' +
        pad(depDate.getMonth() + 1) + '-' + pad(depDate.getDate());
      if (!shownNextDay && depLocalDate !== selectedDate) {
        shownNextDay = true;
        const sep = document.createElement('div');
        sep.className = 'day-separator';
        sep.textContent = 'Natt / neste dag';
        container.appendChild(sep);
      }

      const card = document.createElement('div');
      card.className = 'card' + (isToday && firstCard ? ' next-dep' : '');
      firstCard = false;
      card.setAttribute('role', 'article');
      card.setAttribute('data-dep-iso', depISO);
      card.setAttribute('aria-label', 'Avgang ' + fmtHHMM(depISO));

      const countdownHtml = isToday && mins <= 120
        ? '<span class="countdown ' + countdownClass(mins) + '">' + countdownText(mins) + '</span>'
        : '';

      const destId = currentTo();
      const destPassing = (c.serviceJourney.passingTimes || [])
        .find(pt => pt.quay && pt.quay.stopPlace && pt.quay.stopPlace.id === destId);
      let arrISO = null;
      if (destPassing && destPassing.arrival && destPassing.arrival.time) {
        const base = new Date(depISO);
        const [h, m] = destPassing.arrival.time.split(':').map(Number);
        base.setDate(base.getDate() + (destPassing.arrival.dayOffset || 0));
        base.setHours(h, m, 0, 0);
        arrISO = base.toISOString();
      }
      const arrHtml = arrISO
        ? '<span class="arr-time">→ ' + fmtHHMM(arrISO) + '</span>'
        : '';

      card.innerHTML =
        '<span class="dep-time">' + fmtHHMM(depISO) + '</span>' +
        countdownHtml +
        '<span class="line-name">' + escHtml(line) + '</span>' +
        arrHtml;

      container.appendChild(card);
    });

    if (isToday) startCountdownUpdate(calls);
  }

  function updateCountdowns(calls) {
    calls.forEach(c => {
      const depISO = c.expectedDepartureTime || c.aimedDepartureTime;
      const card = document.querySelector('.card[data-dep-iso="' + depISO + '"]');
      if (!card) return;
      const mins = minutesUntil(depISO);
      const cdEl = card.querySelector('.countdown');
      if (cdEl) {
        cdEl.textContent = countdownText(mins);
        cdEl.className   = 'countdown ' + countdownClass(mins);
      }
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startCountdownUpdate(calls) {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      const cards = document.querySelectorAll('.card');
      calls.forEach((c, i) => {
        if (!cards[i]) return;
        const depISO = c.expectedDepartureTime || c.aimedDepartureTime;
        const mins   = minutesUntil(depISO);
        const cdEl   = cards[i].querySelector('.countdown');
        if (cdEl) {
          cdEl.textContent = countdownText(mins);
          cdEl.className   = 'countdown ' + countdownClass(mins);
        }
      });
    }, 30000);
  }

  function setStatus(state, text) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    dot.className = 'dot ' + state;
    txt.textContent = text;
  }

  function startProgressBar() {
    const fill = document.getElementById('countdown-fill');
    fill.style.transition = 'none';
    fill.style.width = '100%';
    void fill.offsetWidth;
    fill.style.transition = 'width ' + REFRESH_SECS + 's linear';
    fill.style.width = '0%';
  }

  async function fetchDepartures() {
    setStatus('spin', 'Henter avganger…');

    if (refreshTimer) clearTimeout(refreshTimer);
    if (countdownInterval) clearInterval(countdownInterval);

    const isToday = selectedDate === todayISO();
    let dt, timeRange;
    const endOfDay = new Date(selectedDate + 'T23:59:59');
    endOfDay.setMinutes(endOfDay.getMinutes() + 91); // extend to ~01:30 next day to catch late night departures
    if (isToday) {
      dt = new Date().toISOString();
      timeRange = Math.max(60, Math.floor((endOfDay - Date.now()) / 1000));
    } else {
      const offset = -new Date().getTimezoneOffset();
      const sign = offset >= 0 ? '+' : '-';
      const oh = pad(Math.floor(Math.abs(offset) / 60));
      const om = pad(Math.abs(offset) % 60);
      dt = selectedDate + 'T00:00:00' + sign + oh + ':' + om;
      const startOfQuery = new Date(selectedDate + 'T00:00:00');
      timeRange = Math.floor((endOfDay - startOfQuery) / 1000);
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ET-Client-Name': 'personal-ferry-app'
        },
        body: JSON.stringify({
          query: QUERY,
          variables: {
            stopId: currentFrom(),
            startTime: dt,
            timeRange
          }
        })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const json = await res.json();
      if (json.errors && json.errors.length) throw new Error(json.errors[0].message);

      const all = (json.data?.stopPlace?.estimatedCalls || [])
        .filter(c => c.serviceJourney?.line?.transportMode === 'water');
      const calls = isToday
        ? all.filter(c => minutesUntil(c.expectedDepartureTime || c.aimedDepartureTime) >= 0)
        : all;
      renderDepartures(calls, isToday);

      const now2 = new Date();
      const timeStr = pad(now2.getHours()) + ':' + pad(now2.getMinutes());
      setStatus('ok', 'Oppdatert ' + timeStr);
      if (isToday) startProgressBar();

    } catch (err) {
      console.error(err);
      setStatus('error', 'Feil ved henting');
      document.getElementById('departures').innerHTML =
        '<div class="error-card">Kunne ikke hente avganger.<br><small>' + escHtml(err.message) + '</small></div>';
    }

    if (isToday) refreshTimer = setTimeout(fetchDepartures, REFRESH_SECS * 1000);
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') fetchDepartures();
  });

  initDateInput();
  fetchNotices();
  setInterval(fetchNotices, 10 * 60 * 1000);

  function applyDirection(dir) {
    direction = dir;
    const lbl = document.getElementById('dir-label');
    const btn = document.getElementById('dir-btn');
    lbl.textContent = direction === 'horten' ? 'Horten→Moss' : 'Moss→Horten';
    btn.classList.toggle('flipped', direction === 'moss');
  }

  if ('geolocation' in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        const dHorten = distKm(lat, lon, PORTS.horten.lat, PORTS.horten.lon);
        const dMoss   = distKm(lat, lon, PORTS.moss.lat,   PORTS.moss.lon);
        applyDirection(dMoss < dHorten ? 'moss' : 'horten');
        fetchDepartures();
      },
      () => fetchDepartures(),
      { timeout: 5000 }
    );
  } else {
    fetchDepartures();
  }
</script>
</body>
</html>
